name: Reusable Static Site Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        required: true
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -av --delete ./ ${{ inputs.deploy_path }} \
            --exclude '.git' \
            --exclude '.github'

      - name: Deploy (Staging)
        if: github.ref == 'refs/heads/staging'
        run: |
          rsync -av --delete ./ ${{ inputs.deploy_path }}-staging \
            --exclude '.git' \
            --exclude '.github'
